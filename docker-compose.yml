version: '3.8'

services:
  # 0. CADDY — TLS reverse proxy (auto-ACME, subdomain routing)
  caddy:
    container_name: camporee-caddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - landing
      - composer
      - collator
    restart: unless-stopped

  # 1. LANDING — standalone marketing site + early-access form (camporeeconductor.com)
  landing:
    container_name: camporee-landing
    build:
      context: .
      dockerfile: Dockerfile.landing
    ports:
      - "3002:3002"   # Direct access for local dev
    environment:
      - PORT=3002
      - SUBMISSIONS_PATH=/app/data/submissions
    volumes:
      - ./data/landing:/app/data/submissions
    restart: unless-stopped

  # 2. THE COLLATOR (Scorer) - Port 3000
  collator:
    container_name: camporee-collator
    build: .
    env_file: .env
    ports:
      - "3000:3000"   # Keep direct access for local dev / Composer
    environment:
      - PORT=3000
      - ACTIVE_SERVICES=collator     # <--- Identity Assignment
      - EVENT_PATH=/app/data/active-event
      - LIBRARY_PATH=/app/data/library
      - CONDUCTOR_DB_PATH=/app/data/shared/conductor.db
    volumes:
      - ./data/collator:/app/data
      - ./data/curator:/app/data/library
      - ./data/shared:/app/data/shared
      - ./migrations:/app/migrations
      - ./src:/app/src
      - ./views:/app/views
      - ./public:/app/public
      - ./server.js:/app/server.js
    restart: unless-stopped

  # 3. THE COMPOSER & CURATOR (Builder/Library) - Port 3001
  composer:
    container_name: camporee-composer
    build: .
    env_file: .env
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ACTIVE_SERVICES=curator,composer  # <--- Identity Assignment
      - WORKSPACE_PATH=/app/data/workspaces
      - LIBRARY_PATH=/app/data/library
      - CONDUCTOR_DB_PATH=/app/data/shared/conductor.db
    volumes:
      - ./data/composer/workspaces:/app/data/workspaces
      - ./data/curator:/app/data/library
      - ./data/shared:/app/data/shared
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./src:/app/src
      - ./views:/app/views
      - ./public:/app/public
      - ./server.js:/app/server.js
    restart: unless-stopped

volumes:
  caddy_data:
