<!DOCTYPE html>
<html lang="en">
<head>
    <script>window.API_BASE = "/collator";</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camporee Collator - Admin Dashboard</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/conductor.css">
    <link rel="stylesheet" href="css/spreadsheet.css">
    <script src="/js/qrcode.min.js"></script>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/admin.js" defer></script>
    <script>
    fetch('/collator/api/auth/whoami').then(function(r){return r.json();}).then(function(d){
        var badge = document.getElementById('collator-mode-badge');
        if (badge) {
            badge.textContent = d.mode === 'cloud' ? 'CLOUD' : 'OFFLINE';
            badge.title = d.display_name ? ('Signed in as ' + d.display_name) : '';
        }
        if (d.mode === 'offline' && !d.authenticated) {
            window.location.replace('/collator/identify.html');
        }
    }).catch(function(){});
    </script>
</head>
<body>
    <header class="conductor-header theme-official">
        <div class="header-left">
            <button id="header-back-btn" class="hidden" onclick="handleBack()" title="Back">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h1>Camporee Collator<span id="header-subtitle"></span><span id="collator-mode-badge" style="font-size:0.55em;font-weight:normal;opacity:0.7;margin-left:10px;vertical-align:middle;"></span></h1>
        </div>
        <div id="header-actions" class="hidden header-right">
            <div id="mode-filter-container" style="display:flex; align-items:center; gap:10px;">
                <select id="view-mode-select" style="padding:5px; border-radius:4px; font-weight:bold;">
                    <option value="patrol">Patrol Games</option>
                    <option value="troop">Troop Games</option>
                    <option value="exhibition">Exhibition Games</option>
                </select>
            </div>
            <div class="form-check form-switch text-white" style="display:flex; align-items:center; gap:5px;" title="Auto-refresh data every 15s">
                <input class="form-check-input" type="checkbox" id="auto-refresh-switch" style="cursor:pointer;">
                <label class="form-check-label" for="auto-refresh-switch" style="cursor:pointer; font-weight:bold;">Live</label>
            </div>
        </div>
        <nav class="hidden">
            <button id="nav-dashboard">Dashboard</button>
        </nav>
    </header>

    <main>
        <!-- View 0: Dashboard (Landing) -->
        <section id="view-dashboard" class="hidden">
            <div class="dashboard-container">
                <h2 class="dashboard-title">Camporee Collator</h2>

                <div class="dashboard-grid">

                    <button class="dashboard-link-btn" onclick="switchView('registration', true)">
                        <span class="dashboard-icon">📋</span>
                        Registration
                    </button>

                    <a href="official.html" class="dashboard-link-btn">
                        <span class="dashboard-icon">⏱️</span>
                        Scoring
                    </a>

                    <a href="utils.html#awards" class="dashboard-link-btn">
                        <span class="dashboard-icon">🏆</span>
                        Awards
                    </a>

                    <button class="dashboard-link-btn" onclick="switchView('judges', true)">
                        <span class="dashboard-icon">⚖️</span>
                        Judges
                    </button>

                    <a href="utils.html#debug" class="dashboard-link-btn">
                        <span class="dashboard-icon">🛠️</span>
                        System
                    </a>

                    <a href="utils.html#qrcode" class="dashboard-link-btn">
                        <span class="dashboard-icon">📱</span>
                        QR Gen
                    </a>
                </div>

                <div class="dashboard-footer">
                    <a href="judge.html" class="btn btn-outline-secondary">Go to Field Judge App &rarr;</a>
                </div>
            </div>
        </section>

        <!-- View 4: Registration (Tree) -->
        <section id="view-registration" class="hidden">
            <div class="controls">
                <h2 class="hidden">Entity Registration</h2>
                <button onclick="addEntity(null)" class="btn" style="background-color:#27ae60;">+ Add Unit</button>
            </div>

            <div id="roster-tree" style="display:block; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; background: #fff;">
                <!-- Tree Injected Here -->
            </div>
        </section>

        <!-- Add Entity Modal -->
        <div class="modal fade" id="entity-modal" tabindex="-1" aria-labelledby="entity-modal-title" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="entity-modal-title">Add Unit</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div id="em-type-row" class="mb-3">
                            <label class="form-label fw-bold">Unit Type</label>
                            <select id="em-type" class="form-select">
                                <option value="troop">Troop</option>
                                <option value="crew">Crew</option>
                                <option value="webelos">Webelos Den</option>
                            </select>
                        </div>
                        <div id="em-number-row" class="mb-3">
                            <label id="em-number-label" class="form-label fw-bold">Troop Number</label>
                            <input type="text" id="em-number" class="form-control" placeholder="e.g. 42" inputmode="numeric">
                        </div>
                        <div class="mb-1">
                            <label id="em-name-label" class="form-label fw-bold">Name</label>
                            <input type="text" id="em-name" class="form-control" placeholder="">
                            <div id="em-name-hint" class="form-text text-muted"></div>
                        </div>
                        <div id="em-error" class="alert alert-danger mt-3 d-none" role="alert"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" id="em-submit" class="btn btn-success">Add Unit</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- View 6: Judges Directory -->
        <section id="view-judges" class="hidden">
            <div class="controls" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Judges Directory</h2>
                <button id="btn-copy-emails" class="btn btn-secondary">📋 Copy All Emails</button>
            </div>
            <div id="judges-list" class="table-container"></div>
        </section>
    </main>
    <script src="js/demo-hints.js"></script>
</body>
</html>
