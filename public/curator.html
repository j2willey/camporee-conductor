<!DOCTYPE html>
<html lang="en">

<head>
    <script>window.API_BASE = "/composer";</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Librarian</title>

    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/conductor.css">
    <link rel="stylesheet" href="/css/fontawesome.min.css">
    <style>
        body {
            /* Enforce Curator Purple Theme */
            --bs-primary: #6f42c1;
            --bs-primary-rgb: 111, 66, 193;
        }

        .navbar {
            background-color: #6f42c1 !important;
        }

        .btn-outline-primary {
            color: #6f42c1;
            border-color: #6f42c1;
        }

        .btn-outline-primary:hover {
            background-color: #6f42c1;
            color: white;
        }

        .text-primary {
            color: #6f42c1 !important;
        }

        /* Highlight the active template */
        .variant-card {
            border-left: 4px solid #6f42c1;
        }

        #library-sidebar {
            width: 350px;
            /* Wider sidebar for curator to show more details */
        }
    </style>
</head>

<body class="mode-curator">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-book-reader"></i> Game Curator
            </a>

            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light btn-sm me-2" id="newTemplateBtn" onclick="curator.newTemplate()">
                    <i class="fas fa-plus"></i> New Template
                </button>
                <div class="btn-group ms-3" role="group">
                    <button class="btn btn-outline-light btn-sm active" id="modeGames" onclick="curator.setMode('games')">
                        <i class="fas fa-puzzle-piece"></i> Games
                    </button>
                    <button class="btn btn-outline-light btn-sm" id="modeCamporees" onclick="curator.setMode('camporees')">
                        <i class="fas fa-campground"></i> Camporee Templates
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div id="composer-layout">
        <aside id="library-sidebar">
            <div class="sidebar-header p-3 border-bottom d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-book"></i> Catalog</h5>
                <button class="btn btn-sm btn-link text-muted" onclick="curator.init()"><i
                        class="fas fa-sync"></i></button>
            </div>
            <!-- Search Bar added for filtering -->
            <div class="p-2 border-bottom bg-light">
                <input type="text" id="catalog-search" class="form-control form-control-sm"
                    placeholder="Search titles or #tags..." onkeyup="curator.filterCatalog()">
            </div>
            <ul id="library-list" class="list-unstyled p-0 mb-0"></ul>
            <div id="library-status" class="p-3 text-muted small text-center">Loading Library...</div>
        </aside>

        <main id="composer-main-pane">
            <div class="container-fluid py-3">

                <!-- Curator doesn't need tabs, just the editor -->
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="p-3">
                            <div id="editor-container">
                                <div class="text-center py-5 text-muted">
                                    <i class="fas fa-arrow-left fa-3x mb-3"></i>
                                    <p>Select a template from the library to edit, or create a new one.</p>
                                </div>
                            </div>
                            <div id="preview-container" class="mt-4 pt-4 border-top d-none">
                                <p class="text-center text-muted">Select a template to preview.</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <!-- CAMPOREE TEMPLATES MODE — sidebar + main, hidden until setMode('camporees') -->
        <div id="template-sidebar" style="display:none; width:350px; flex-shrink:0; overflow-y:auto; border-right:1px solid #ddd; background:#f8f9fa;">
            <div class="sidebar-header p-3 border-bottom d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-campground"></i> Camporee Templates</h5>
                <button class="btn btn-sm btn-link text-muted" onclick="curator.loadTemplates()">
                    <i class="fas fa-sync"></i>
                </button>
            </div>
            <div id="template-list" class="p-2">
                <div class="text-center text-muted p-4">Loading...</div>
            </div>
        </div>

        <div id="template-main" style="display:none; overflow-y:auto;" class="flex-grow-1 p-4">
            <div id="template-preview">
                <div class="text-center text-muted p-5">
                    <i class="fas fa-campground fa-3x mb-3 d-block"></i>
                    Select a camporee template from the list to preview it.
                </div>
            </div>
        </div>

    </div>

    <!-- Modals -->
    <div class="modal fade" id="presetModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Insert Preset</h5><button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label">Choose Field</label><select class="form-select"
                            id="presetSelect"></select></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary"
                        onclick="curator.confirmInsertPreset()">Insert</button></div>
            </div>
        </div>
    </div>

    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/jszip.min.js"></script>
    <script src="/js/FileSaver.min.js"></script>
    <script src="/js/marked.min.js"></script>
    <script src="/js/handlebars.min.js"></script>
    <link rel="stylesheet" href="/css/easymde.min.css">
    <script src="/js/easymde.min.js"></script>

    <script type="module" src="/js/apps/curator.js"></script>
</body>

</html>
