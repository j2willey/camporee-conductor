<!DOCTYPE html>
<html lang="en">
<head>
    <script>window.API_BASE = "/collator";</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camporee Conductor — Live Demo</title>
    <link rel="stylesheet" href="css/conductor.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--green-dark);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .demo-header {
            background: var(--brand-header);
            border-bottom: 2px solid var(--brand-accent);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .demo-header .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gold-light);
            white-space: nowrap;
        }
        .demo-header .tagline {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }
        .demo-badge {
            margin-left: auto;
            background: var(--gold);
            color: #000;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* ── MAIN AREA ── */
        .demo-area {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── LEFT: PHONE PANEL ── */
        .phone-panel {
            flex: 0 0 44%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 16px 16px;
            gap: 10px;
        }
        .panel-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
        }

        /* ── PHONE BEZEL — iPhone 14/15 proportions (390×844 CSS px) ── */
        .phone-bezel {
            height: min(844px, calc(100dvh - 130px));
            aspect-ratio: 390 / 844;
            background: #0f0f0f;
            border-radius: 55px;
            padding: 17px 14px 22px;
            box-shadow:
                0 0 0 1px #333,
                0 0 0 3px #222,
                0 24px 64px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        /* Volume buttons (left side, decorative) */
        .phone-bezel::before {
            content: '';
            position: absolute;
            left: -4px;
            top: 124px;
            width: 3px;
            height: 38px;
            background: #2a2a2a;
            border-radius: 2px 0 0 2px;
            box-shadow: 0 56px 0 #2a2a2a;
        }
        /* Power button (right side, decorative) */
        .phone-bezel::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 160px;
            width: 3px;
            height: 68px;
            background: #2a2a2a;
            border-radius: 0 2px 2px 0;
        }
        /* Dynamic island */
        .phone-notch {
            width: 120px;
            height: 28px;
            background: #0f0f0f;
            border-radius: 0 0 20px 20px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        /* Camera dot */
        .phone-notch::after {
            content: '';
            width: 11px;
            height: 11px;
            background: #1c1c1c;
            border-radius: 50%;
            border: 1.5px solid #2d2d2d;
        }
        .phone-screen {
            flex: 1;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
        }
        .phone-screen iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ── RIGHT: OFFICIALS PANEL ── */
        .officials-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 16px 0;
            gap: 10px;
            overflow: hidden;
        }
        .officials-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
            animation: livepulse 2s ease-in-out infinite;
        }
        @keyframes livepulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.25; }
        }
        .officials-frame {
            flex: 1;
            border: none;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* ── Airplane mode toggle ── */
        .airplane-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 5px 14px 5px 10px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
            user-select: none;
        }
        .airplane-toggle:hover { background: rgba(255,255,255,0.12); }
        .airplane-toggle.active {
            background: rgba(184,134,11,0.25);
            border-color: rgba(184,134,11,0.5);
            color: #f0c040;
        }
        .airplane-toggle .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .airplane-toggle.active .dot { background: #f0c040; }

        /* ── NARROW: phone fills the tab, officials hidden ── */
        @media (max-width: 900px) {
            .officials-panel { display: none; }
            .phone-panel {
                flex: 1;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="demo-header">
        <span class="logo">Camporee Conductor</span>
        <span class="tagline">Score games on your phone · watch the leaderboard update live</span>
        <span class="demo-badge">DEMO</span>
    </div>

    <div class="demo-area">
        <!-- Left: phone emulator wrapping the real judge PWA -->
        <div class="phone-panel">
            <div class="panel-label">Judge App</div>
            <div class="phone-bezel">
                <div class="phone-notch"></div>
                <div class="phone-screen">
                    <iframe id="judge-iframe" src="./judge.html" title="Judge App"></iframe>
                </div>
            </div>
            <button id="airplane-toggle" class="airplane-toggle" onclick="toggleAirplaneMode()" title="Simulate offline — scores queue locally and sync when toggled back on">
                <span class="dot"></span>
                ✈ Airplane Mode
            </button>
        </div>

        <!-- Right: officials leaderboard — auto-refresh enabled via URL param -->
        <div class="officials-panel">
            <div class="officials-label">
                <div class="live-dot"></div>
                Live Competition Overview
            </div>
            <iframe
                class="officials-frame"
                src="./official.html?autorefresh=1"
                title="Officials Leaderboard"
            ></iframe>
        </div>
    </div>
    <script src="js/demo-hints.js"></script>
    <script>
        let _airplaneActive = false;
        function toggleAirplaneMode() {
            const btn = document.getElementById('airplane-toggle');
            const iframe = document.getElementById('judge-iframe');
            _airplaneActive = !_airplaneActive;
            btn.classList.toggle('active', _airplaneActive);
            const eventName = _airplaneActive ? 'offline' : 'online';
            iframe.contentWindow.dispatchEvent(new Event(eventName));
        }
    </script>
</body>
</html>
