<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camporee Collator — Identify</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/conductor.css">
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .identify-card { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 2.5rem; max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .identify-card h2 { color: #e94560; margin-bottom: 0.25rem; }
        .identify-card .subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; }
        #event-title { color: #fff; font-size: 1.05rem; margin-bottom: 1.5rem; }
        #status-msg { font-size: 0.9rem; min-height: 1.4em; }
    </style>
</head>
<body>
    <div class="identify-card">
        <h2>Camporee Collator</h2>
        <p class="subtitle">Officials Only</p>
        <p id="event-title"></p>
        <form id="identify-form" autocomplete="off">
            <div class="mb-3">
                <label for="email-input" class="form-label text-white">Enter your email address</label>
                <input type="email" id="email-input" class="form-control form-control-lg bg-dark text-white border-secondary"
                       placeholder="you@example.com" required autocomplete="email">
            </div>
            <button type="submit" id="submit-btn" class="btn btn-primary w-100 btn-lg">Sign In</button>
        </form>
        <p id="status-msg" class="mt-3 text-center"></p>
    </div>

    <script>
    const API = '/collator';
    var isDemo = false;

    // Load event title and detect demo mode
    fetch(API + '/games.json').then(function(r){ return r.json(); }).then(function(d){
        var title = d && d.metadata && d.metadata.title;
        if (title) document.getElementById('event-title').textContent = title;
    }).catch(function(){});

    fetch(API + '/api/demo-mode').then(function(r){ return r.json(); }).then(function(d){
        if (!d.demo) return;
        isDemo = true;

        // Inject password field + demo hint before the submit button
        var form = document.getElementById('identify-form');
        var btn = document.getElementById('submit-btn');

        var hint = document.createElement('p');
        hint.className = 'text-info mb-3';
        hint.style.fontSize = '0.85rem';
        hint.textContent = 'Demo access — enter any email. Password: Camporee';
        form.insertBefore(hint, btn);

        var pwWrap = document.createElement('div');
        pwWrap.className = 'mb-3';
        pwWrap.innerHTML = '<label for="password-input" class="form-label text-white">Password</label>' +
            '<input type="password" id="password-input" class="form-control form-control-lg bg-dark text-white border-secondary" placeholder="Camporee" required autocomplete="current-password">';
        form.insertBefore(pwWrap, btn);
    }).catch(function(){});

    document.getElementById('identify-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('email-input').value.trim();
        var btn = document.getElementById('submit-btn');
        var msg = document.getElementById('status-msg');

        var body = { email: email };
        if (isDemo) {
            var pwEl = document.getElementById('password-input');
            body.password = pwEl ? pwEl.value : '';
        }

        btn.disabled = true;
        btn.textContent = 'Checking…';
        msg.textContent = '';
        msg.className = 'mt-3 text-center';

        fetch(API + '/api/auth/identify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
        .then(function(r) { return r.json().then(function(d){ return { ok: r.ok, data: d }; }); })
        .then(function(result) {
            if (result.ok) {
                msg.textContent = 'Welcome, ' + (result.data.display_name || email) + '! Redirecting…';
                msg.classList.add('text-success');
                setTimeout(function(){ window.location.replace(API + '/admin.html'); }, 800);
            } else {
                msg.textContent = result.data.error || 'Access denied.';
                msg.classList.add('text-danger');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        })
        .catch(function() {
            msg.textContent = 'Network error. Please try again.';
            msg.classList.add('text-danger');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        });
    });
    </script>
    <script src="js/demo-hints.js"></script>
</body>
</html>
